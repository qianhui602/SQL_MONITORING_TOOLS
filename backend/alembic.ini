[alembic]
# 迁移脚本存放路径
script_location = alembic

# sqlalchemy.url 使用 %(VAR)s 模板变量，由 env.py 运行时注入
# 实际连接参数从 app.config 获取
sqlalchemy.url = postgresql://%(DB_USER)s:%(DB_PASS)s@%(DB_HOST)s:%(DB_PORT)s/%(DB_NAME)s

# 日志格式
log_file = alembic.log
log_level = WARN

[post_write_hooks]

# 对生成的迁移脚本启用自动格式化（如果安装了 black）
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
